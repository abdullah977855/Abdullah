<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html;charset=utf-8"/>
    <title>Amazing Slider</title>
    
    <!-- Insert to your webpage before the </head> -->
    <script src="sliderengine/jquery.js"></script>
    <script src="sliderengine/amazingslider.js"></script>
    <link rel="stylesheet" type="text/css" href="sliderengine/amazingslider-1.css">
    <script src="sliderengine/initslider-1.js"></script>
    <!-- End of head section HTML codes -->
    
</head>
<body>
    
    <!-- Insert to your webpage where you want to display the slider -->
    <div class="amazingslider-wrapper" id="amazingslider-wrapper-1" style="display:block;position:relative;max-width:900px;margin:0px auto 56px;">
        <div class="amazingslider" id="amazingslider-1" style="display:block;position:relative;margin:0 auto;">
            <ul class="amazingslider-slides" style="display:none;">
                <li><img src="images/saylaniimage.png" alt="saylaniimage"  title="saylaniimage" />
                </li>
                <li><img src="images/admissionopen.png" alt="admissionopen"  title="admissionopen" />
<a href="https://www.saylanimit.com/enroll"><button class="amazingsliderbutton as-btn-blue-medium">Admission Open</button></a>
                </li>
                <li><img src="images/lms.jpg" alt="lms"  title="lms" />
<a href="https://lms.saylanimit.com/login"><button class="amazingsliderbutton as-btn-blue-medium">LMS Link</button></a>
                </li>
                <li><img src="images/channelyoutube.jpg" alt="channelyoutube"  title="channelyoutube" />
<a href="https://www.youtube.com/codewithharry"><button class="amazingsliderbutton as-btn-blue-medium">Youtube Channel</button></a>
                </li>
            </ul>
            <ul class="amazingslider-thumbnails" style="display:none;">
                <li><img src="images/saylaniimage-tn.png" alt="saylaniimage" title="saylaniimage" /></li>
                <li><img src="images/admissionopen-tn.png" alt="admissionopen" title="admissionopen" /></li>
                <li><img src="images/lms-tn.jpg" alt="lms" title="lms" /></li>
                <li><img src="images/channelyoutube-tn.jpg" alt="channelyoutube" title="channelyoutube" /></li>
            </ul>
        <div class="amazingslider-engine"><a href="http://amazingslider.com" title="Responsive JavaScript Image Slider">Responsive JavaScript Image Slider</a></div>
        </div>
    </div>
    <!-- End of body section HTML codes -->
    
</body>
</html>
