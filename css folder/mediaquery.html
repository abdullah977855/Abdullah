<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <link rel="stylesheet" href="mediaquery.css">
</head>

<body>
    <div id="container">
        <div class="card">
            <img src="https://mrlaptop.pk/wp-content/uploads/2018/09/Apple-Macbook-Pro-MPXV2-Price-in-Pakistan-600x600.jpg" alt="Mac Book">
            <div class="content">
                <h2>Mac Book</h2>
                <div>$1000</div>
                <button>Add to Cart</button>
            </div>
        </div>
        <div class="card">
            <img src="https://headon.com.pk/wp-content/uploads/2025/08/hp-laptop-15-fd0361tu-3-35368-2321045-030325114112082.png" alt="hp Laptop">
            <div class="content">
                <h2>hp</h2>
                <div>$700</div>
                <button>Add to Cart</button>
            </div>
        </div>
        <div class="card">
            <img src="https://cdn.mos.cms.futurecdn.net/MjUjNiFhGnbXb9QU78u8Sc.jpg" alt="Dell Laptop">
            <div class="content">
                <h2>Dell</h2>
                <div>$630</div>
                <button>Add to Cart</button>
            </div>
        </div>
        <div class="card">
            <img src="https://static.webx.pk/files/44174/Images/o3-44174-0-230524082513286.png" alt="Lenovo Book">
            <div class="content">
                <h2>Lenovo</h2>
                <div>$230</div>
                <button>Add to Cart</button>
            </div>
        </div>
        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQmD8jSpvUxwJ0oYv5Iyu9rYgmb_AupGT7l-g&s" alt="Chorme Book">
            <div class="content">
                <h2>ChormeBook</h2>
                <div>$72</div>
                <button>Add to Cart</button>
            </div>
        </div>
    </div>
</body>

</html>
