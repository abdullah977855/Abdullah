<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <script src="sliderengine/jquery.js"></script>
    <script src="sliderengine/amazingslider.js"></script>
    <link rel="stylesheet" type="text/css" href="sliderengine/amazingslider-1.css">
    <script src="sliderengine/initslider-1.js"></script>
</head>

<body>
    <h1>Applying Slider of Coding</h1>
    <div class="amazingslider-wrapper" id="amazingslider-wrapper-1"
        style="display:block;position:relative;max-width:900px;margin:0px auto 56px;">
        <div class="amazingslider" id="amazingslider-1" style="display:block;position:relative;margin:0 auto;">
            <ul class="amazingslider-slides" style="display:none;">
                <li><img src="images/1.jpg" alt="1" title="1" />
                </li>
                <li><img src="images/2.jpg" alt="2" title="2" />
                </li>
            </ul>
            <ul class="amazingslider-thumbnails" style="display:none;">
                <li><img src="images/1-tn.jpg" alt="1" title="1" /></li>
                <li><img src="images/2-tn.jpg" alt="2" title="2" /></li>
            </ul>
            <div class="amazingslider-engine"><a href="http://amazingslider.com" title="jQuery Slideshow">jQuery
                    Slideshow</a></div>
        </div>
    </div>
</body>

</html>
